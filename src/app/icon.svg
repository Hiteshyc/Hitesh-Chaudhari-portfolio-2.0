<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#1e1e2e" />
      <stop offset="100%" stop-color="#11111b" />
    </radialGradient>
    
    <!-- Accent Gradient Primary (Blue to Magenta) for the Right Pillar & Crossbar -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#89b4fa" />
      <stop offset="50%" stop-color="#cba6f7" />
      <stop offset="100%" stop-color="#f5c2e7" />
    </linearGradient>
    
    <!-- Secondary Glow Gradient (Mint/Teal to Sky Blue) for the C-curve -->
    <linearGradient id="glowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a6e3a1" />
      <stop offset="100%" stop-color="#89dceb" />
    </linearGradient>

    <!-- Drop Shadow Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Rounded Container -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#313244" stroke-width="8"/>

  <!-- Glowing background tech lines -->
  <path d="M 64,128 L 128,128 L 192,64" stroke="#45475a" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.35" />
  <path d="M 448,384 L 384,384 L 320,448" stroke="#45475a" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.35" />
  <circle cx="192" cy="64" r="6" fill="#45475a" opacity="0.35" />
  <circle cx="320" cy="448" r="6" fill="#45475a" opacity="0.35" />

  <!-- Core Integrated Monogram Mark (unified H and C) -->
  <g filter="url(#glow)">
    <!-- H Right Pillar -->
    <rect x="336" y="120" width="44" height="272" rx="22" fill="url(#accentGrad)" />
    
    <!-- H Crossbar (links C-curve to Right Pillar) -->
    <rect x="160" y="234" width="186" height="44" rx="10" fill="url(#accentGrad)" />
    
    <!-- C-Curve (sweeps left, doubling as the H's Left Pillar) -->
    <path d="M 300,120 C 190,120 156,170 156,256 C 156,342 190,392 300,392" 
          stroke="url(#glowGrad)" 
          stroke-width="44" 
          stroke-linecap="round" 
          fill="none" />
  </g>

  <!-- Terminal Nodes for high-tech aesthetic -->
  <circle cx="300" cy="120" r="10" fill="#a6e3a1" filter="url(#glow)" />
  <circle cx="300" cy="392" r="10" fill="#89dceb" filter="url(#glow)" />
</svg>
