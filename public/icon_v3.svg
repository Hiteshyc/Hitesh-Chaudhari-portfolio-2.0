<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Professional Midnight Slate Background -->
  <rect width="512" height="512" rx="112" fill="#0f172a" stroke="#1e293b" stroke-width="6"/>

  <g transform="translate(10, 0)">
    <!-- Elegant C-curve looping behind H (Steel Blue) -->
    <path d="M 330,150 C 210,100 130,170 130,256 C 130,342 210,412 330,362" 
          stroke="#38bdf8" 
          stroke-width="36" 
          stroke-linecap="round" 
          fill="none" 
          opacity="0.9" />
          
    <!-- Clean, Minimal H (Slate White) -->
    <!-- Left Strut of H -->
    <rect x="200" y="130" width="36" height="252" rx="10" fill="#f8fafc" />
    
    <!-- Right Strut of H -->
    <rect x="306" y="130" width="36" height="252" rx="10" fill="#f8fafc" />
    
    <!-- H Crossbar -->
    <rect x="236" y="238" width="70" height="36" fill="#f8fafc" />
  </g>
</svg>
